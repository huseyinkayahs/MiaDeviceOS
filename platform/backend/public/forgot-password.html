<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>FactoryBox Şifremi Unuttum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/styles.css" rel="stylesheet">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="card login-card">
      <h1>Şifremi Unuttum</h1>
      <p class="muted">v5.4.0 SaaS Billing / Subscription Foundation Pack</p>

      <p class="auth-note">
        Hesabınızda kayıtlı e-posta adresini yazın. Hesap aktifse güvenli sıfırlama bağlantısı e-posta ile gönderilir.
      </p>

      <label>E-posta</label>
      <input id="email" type="email" placeholder="ornek@firma.com" autocomplete="email">

      <button id="sendBtn" class="primary-btn">Sıfırlama Bağlantısı Gönder</button>
      <p id="status" class="mini-status"></p>

      <a href="/login.html" class="secondary-btn link-btn">Login’e Dön</a>
    </section>
  </main>

  <script>
    async function requestReset() {
      const email = document.getElementById('email').value.trim();
      const status = document.getElementById('status');
      const btn = document.getElementById('sendBtn');

      if (!email) {
        status.textContent = 'E-posta adresini yazın.';
        return;
      }

      status.textContent = 'İstek gönderiliyor...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({email})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || `İstek başarısız (${res.status})`);

        status.textContent = 'Hesap aktifse sıfırlama bağlantısı e-posta adresinize gönderildi.';
        document.getElementById('email').value = '';
      } catch(e) {
        status.textContent = e.message;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('sendBtn').addEventListener('click', requestReset);
    document.getElementById('email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') requestReset();
    });
  </script>
</body>
</html>
