<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>FactoryBox Yeni Şifre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/styles.css" rel="stylesheet">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="card login-card">
      <h1>Yeni Şifre Belirle</h1>
      <p class="muted">v5.4.0 SaaS Billing / Subscription Foundation Pack</p>

      <p id="tokenStatus" class="auth-note">Bağlantı doğrulanıyor...</p>

      <div id="resetForm" hidden>
        <label>Yeni Şifre</label>
        <input id="password" type="password" placeholder="En az 8 karakter" autocomplete="new-password">

        <label>Yeni Şifre Tekrar</label>
        <input id="passwordConfirm" type="password" placeholder="Şifreyi tekrar yazın" autocomplete="new-password">

        <p class="password-rules">Şifre 8–128 karakter arasında olmalıdır.</p>
        <button id="resetBtn" class="primary-btn">Şifreyi Güncelle</button>
        <p id="status" class="mini-status"></p>
      </div>

      <a href="/login.html" class="secondary-btn link-btn">Login’e Dön</a>
    </section>
  </main>

  <script>
    const token = new URLSearchParams(window.location.search).get('token') || '';
    const tokenStatus = document.getElementById('tokenStatus');
    const resetForm = document.getElementById('resetForm');

    async function validateToken() {
      if (!token) {
        tokenStatus.textContent = 'Sıfırlama bağlantısında token bulunamadı.';
        tokenStatus.classList.add('error');
        return;
      }

      try {
        const res = await fetch('/api/auth/password-reset/validate', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({token})
        });
        const data = await res.json();
        if (!res.ok || !data.valid) throw new Error(data.message || 'Bağlantı geçersiz.');

        tokenStatus.textContent = `Bağlantı doğrulandı: ${data.email_hint || 'hesap'}`;
        tokenStatus.classList.add('success');
        resetForm.hidden = false;
      } catch(e) {
        tokenStatus.textContent = 'Bu bağlantı geçersiz, süresi dolmuş veya daha önce kullanılmış.';
        tokenStatus.classList.add('error');
      }
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('passwordConfirm').value;
      const status = document.getElementById('status');
      const btn = document.getElementById('resetBtn');

      if (password.length < 8) {
        status.textContent = 'Şifre en az 8 karakter olmalıdır.';
        return;
      }
      if (password !== confirm) {
        status.textContent = 'Şifreler aynı değil.';
        return;
      }

      status.textContent = 'Şifre güncelleniyor...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({token, password})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || `İşlem başarısız (${res.status})`);

        localStorage.removeItem('factorybox_auth_token');
        status.textContent = 'Şifreniz güncellendi. Login ekranına yönlendiriliyorsunuz...';
        tokenStatus.textContent = 'Şifre başarıyla güncellendi.';
        tokenStatus.classList.remove('error');
        tokenStatus.classList.add('success');
        resetForm.querySelectorAll('input,button').forEach(el => el.disabled = true);
        setTimeout(() => { window.location.href = '/login.html'; }, 1200);
      } catch(e) {
        status.textContent = e.message;
        btn.disabled = false;
      }
    }

    document.getElementById('resetBtn').addEventListener('click', resetPassword);
    document.getElementById('passwordConfirm').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') resetPassword();
    });

    validateToken();
  </script>
</body>
</html>
